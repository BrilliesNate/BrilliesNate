<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Card</title>
    <link rel="stylesheet" href="card.css">
</head>

<body>


    <div class="section over-hide">
        <div class="container">
            <div class="row full-height justify-content-center">
                <div class="col-12 text-center align-self-center py-5">
                    <div class="section text-center py-5 py-md-0">
                        <input class="pricing" type="checkbox" id="pricing" name="pricing" />
                        <label for="pricing"><span class="block-diff">kayaking<span
                                    class="float-right">camping</span></span></label>
                        <div class="card-3d-wrap mx-auto">
                            <div class="card-3d-wrapper">
                                <div class="card-front">
                                    <div class="pricing-wrap">
                                        <h4 class="mb-5">Yield</h4>
                                        <h2 class="mb-2"><sup>Daily</sup>4.03<sup>kW</sup></h2>
                                        <h2 class="mb-2"><sup>Monthly</sup>14.03<sup>kW</sup></h2>
                                        <h2 class="mb-2"><sup>Yearly</sup>104.03<sup>kW</sup></h2>
                                        <!-- <p class="mb-4">per person</p> -->
                                        <p class="mb-1"><i class="uil uil-location-pin-alt size-22"></i></p>
                                        <!-- <p class="mb-4">Drina, Serbia</p> -->
                                        <!-- <a href="#0" class="link">Choose Date</a> -->
                                        <div class="img-wrap img-2">
                                            <img  class="skyImg" src="C:\Users\user pc\Documents\NetBeansProjects\dashboardCard\image996.png" alt="">
                                        </div>
                                        <div class="img-wrap img-1">
                                            <img class = "yieldImg" src="C:\Users\user pc\Documents\NetBeansProjects\dashboardCard\image832.png" alt="">
                                        </div>
                                        <div class="img-wrap img-3">
                                            <img class ="sunImg" src="C:\Users\user pc\Documents\NetBeansProjects\dashboardCard\pngwing.com (56).png" alt="">
                                        </div>
                                        <!-- <div class="img-wrap img-6">
                                            <img src="https://assets.codepen.io/1462889/Stone.png" alt="">
                                        </div> -->
                                    </div>
                                </div>
                                <div class="card-back">
                                    <div class="pricing-wrap">
                                        <h4 class="mb-5">Saving</h4>
                                        <h2 class="mb-2"><sup>R</sup>4.03<sup>Daily</sup></h2>
                                        <h2 class="mb-2"><sup>R</sup>14.03<sup>Monthly</sup></h2>
                                        <h2 class="mb-2"><sup>R</sup>104.03<sup>Yearly</sup></h2>
                                        <!-- <p class="mb-4">per person</p> -->
                                        <p class="mb-1"><i class="uil uil-location-pin-alt size-22"></i></p>
                                        <!-- <p class="mb-4">Tara, Serbia</p> -->
                                        <!-- <a href="#0" class="link">Choose Date</a> -->
                                        <div class="img-wrap img-2">
                                            <img src="https://assets.codepen.io/1462889/grass.png" alt="">
                                        </div>
                                        <div class="img-wrap img-4">
                                            <img class ="savingsImg" src="C:\Users\user pc\Documents\NetBeansProjects\dashboardCard\image1008.png" alt="">
                                        </div>
                                        <div class="img-wrap img-5">
                                            <img class ="plantImg" src="https://assets.codepen.io/1462889/Ivy.png" alt="">
                                        </div>
                                        <!-- <div class="img-wrap img-7">
                                            <img src="https://assets.codepen.io/1462889/IvyRock.png" alt="">
                                        </div> -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="card.js"></script>
</body>

</html>
